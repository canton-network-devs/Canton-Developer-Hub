name: Generate llms.txt for Mintlify AI indexing

on:
  push:
    branches: [main]
    paths:
      - "Github Page/tools.json"
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * *"  # daily safety-net run in case a push is missed

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (source of tools.json + script)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout page (deploy target — the live site)
        uses: actions/checkout@v4
        with:
          ref: page
          path: page
          fetch-depth: 0
          token: ${{ secrets.LLMS_PUSH_TOKEN }}

      - name: Generate llms.txt from tools.json
        working-directory: main
        run: python3 .github/scripts/generate_llms_txt.py

      - name: Copy into page branch root and push
        run: |
          cp "main/Github Page/llms.txt" page/llms.txt
          cp "main/Github Page/catalog.html" page/catalog.html
          cd page
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt catalog.html
          git diff --cached --quiet || git commit -m "chore: regenerate llms.txt + catalog.html from tools.json [automated]"
          git push origin page
